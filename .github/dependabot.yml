version: 2
updates:
  # npm dependencies — weekly, grouped to keep PR noise low.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Patch/minor bumps batched into one PR; majors stay individual for review.
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies

  # Keep the GitHub Actions used in workflows current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
